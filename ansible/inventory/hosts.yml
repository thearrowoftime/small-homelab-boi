# Inventory for the local Docker-based home lab.
# Containers expose SSH on host loopback ports 222{1,2,3}.
# k3s nodes talk to each other over the 'small-homelab' Docker network using container hostnames.
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ../docker/ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3

  children:
    k3s_cluster:
      children:
        server:
          hosts:
            master:
              ansible_host: 127.0.0.1
              ansible_port: 2221
              # Address other nodes will use to reach the API server.
              k3s_advertise_address: master
        agent:
          hosts:
            worker1:
              ansible_host: 127.0.0.1
              ansible_port: 2222
            worker2:
              ansible_host: 127.0.0.1
              ansible_port: 2223
