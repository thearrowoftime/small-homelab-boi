---
# Runs on the k3s server node. Talks to the cluster via the in-cluster kubeconfig
# at /etc/rancher/k3s/k3s.yaml. Uses the helm CLI installed by the k3s_server role.

- name: Create monitoring namespace
  ansible.builtin.command: >
    /usr/local/bin/k3s kubectl create namespace {{ monitoring_namespace }}
    --dry-run=client -o yaml
  register: ns_manifest
  changed_when: false

- name: Apply monitoring namespace
  ansible.builtin.shell: |
    echo '{{ ns_manifest.stdout }}' | /usr/local/bin/k3s kubectl apply -f -
  register: ns_apply
  changed_when: "'created' in ns_apply.stdout or 'configured' in ns_apply.stdout"

- name: Render kube-prometheus-stack values file
  ansible.builtin.template:
    src: kps-values.yaml.j2
    dest: "{{ monitoring_values_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Add prometheus-community helm repo
  ansible.builtin.command: >
    /usr/local/bin/helm repo add {{ monitoring_chart_repo_name }} {{ monitoring_chart_repo_url }}
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"
  failed_when:
    - helm_repo_add.rc != 0
    - "'already exists' not in helm_repo_add.stderr"

- name: Update helm repos
  ansible.builtin.command: /usr/local/bin/helm repo update
  changed_when: false

- name: Install or upgrade kube-prometheus-stack
  ansible.builtin.command: >
    /usr/local/bin/helm upgrade --install {{ monitoring_release_name }}
    {{ monitoring_chart_name }}
    --namespace {{ monitoring_namespace }}
    --version {{ monitoring_chart_version }}
    --values {{ monitoring_values_file }}
    --wait --timeout 10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: helm_install
  changed_when:
    - "'has been upgraded' in helm_install.stdout or 'has been installed' in helm_install.stdout"
