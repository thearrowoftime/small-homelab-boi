---
extends: default

rules:
  line-length:
    max: 140
    level: warning
  truthy:
    allowed-values: ["true", "false", "yes", "no"]
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  braces:
    max-spaces-inside: 1
  octal-values:
    forbid-implicit-octal: true

ignore: |
  ansible/.ansible_cache/
  kubeconfig
